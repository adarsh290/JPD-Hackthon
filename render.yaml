services:
  # Backend Web Service
  - type: web
    name: smart-link-hub-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-link-hub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        fromService:
          type: web
          name: smart-link-hub-frontend
          property: host
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: web
    name: smart-link-hub-frontend
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: smart-link-hub-backend
          property: host

databases:
  - name: smart-link-hub-db
    databaseName: smart_link_hub
    user: smart_link_hub_user
    plan: starter
    region: oregon